{% extends "layout.html" %}

{% block body %}

<h3>Login</h3>

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
{% endif %}
{% endwith %}

<form method="post">
    <input name="username" placeholder="username">

    <br><br>

    <input name="password" placeholder="password">

    <br><br>

    <button type="submit">Login</button>
</form>

{% endblock%}
